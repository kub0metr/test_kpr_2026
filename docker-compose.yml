version: '3.8'

services:
  backend:
    build: ./BackApp
    ports:
    - "8000:8000"
    networks:
    - app-network
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "python3 create_db.py && uvicorn main:bakery_app --host 0.0.0.0 --port 8000"
  db:
    image: postgres:16-alpine
    container_name: bakery_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: belle
    ports:
      - "5433:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d belle"]
      interval: 1s
      timeout: 1s
      retries: 5

networks:
  app-network:
    driver: bridge
  # frontend:
  #   build: ./frontend