version: '3.8'

services:
  backend:
    build: ./BackApp
    ports:
    - "8000:8000"
    networks:
    - app-network
  db:
    image: postgres:16-alpine
    container_name: bakery_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: belle
    ports:
      - "5433:5433"

networks:
  app-network:
    driver: bridge
  # frontend:
  #   build: ./frontend